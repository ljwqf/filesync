name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
          - target: linux-amd64
            goos: linux
            goarch: amd64
            ext: ''
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
            ext: ''
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          OUTPUT="dist/filesync-${{ matrix.target }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "$OUTPUT" .
          echo "Built $OUTPUT ($(du -h $OUTPUT | cut -f1))"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: filesync-${{ matrix.target }}
          path: dist/filesync-${{ matrix.target }}${{ matrix.ext }}
          retention-days: 90

  checksums:
    name: Aggregate checksums
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Generate aggregated checksums
        run: |
          mkdir -p release-assets
          for f in all-artifacts/*/filesync-*; do
            cp "$f" release-assets/
          done
          cd release-assets
          sha256sum * > checksums.txt
          echo "=== Checksums ==="
          cat checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
