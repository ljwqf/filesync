name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.10'
          cache: false

      - name: Download modules (fresh mod cache)
        env:
          GOMODCACHE: ${{ runner.temp }}/gomod
        run: go mod download

      - name: Test (race detector + coverage)
        env:
          GOMODCACHE: ${{ runner.temp }}/gomod
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Enforce coverage floor (80%, ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        env:
          GOMODCACHE: ${{ runner.temp }}/gomod
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit !(t >= 80) }' || {
            echo "::error::Coverage ${total}% is below the 80% floor"
            exit 1
          }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.out
          if-no-files-found: ignore

      - name: Build
        env:
          GOMODCACHE: ${{ runner.temp }}/gomod
        run: go build -o filesync.exe .
