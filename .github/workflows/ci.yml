name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Diagnose
        run: |
          echo "=== go.mod ==="
          cat go.mod
          echo "=== go list -m ==="
          go list -m
          echo "=== go env GOMOD ==="
          go env GOMOD
          echo "=== go env GOPATH ==="
          go env GOPATH
          echo "=== go env GOWORK ==="
          go env GOWORK
          echo "=== ls internal/ ==="
          ls internal/
          echo "=== go list all ==="
          go list -m all 2>&1 | head -20
          echo "=== find old module in cache ==="
          find $(go env GOMODCACHE)/cache/download -path "*ljw/filesync*" 2>/dev/null || echo "not found in download cache"
          find $(go env GOMODCACHE)/github.com/ljw -maxdepth 3 2>/dev/null || echo "not found in mod cache"

      - name: Download modules
        run: go mod download

      - name: Test (race detector)
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o filesync.exe .
