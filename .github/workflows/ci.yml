name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Diagnose module resolution
        run: |
          echo "=== go.mod ==="
          cat go.mod
          echo "=== go list -m ==="
          go list -m
          echo "=== go env GOMOD GOPATH GOWORK GOPROXY ==="
          go env GOMOD GOPATH GOWORK GOPROXY
          echo "=== go env GONOSUMCHECK GONOSUMDB ==="
          go env GONOSUMCHECK GONOSUMDB
          echo "=== go list all ==="
          go list -m all 2>&1 | head -20

      - name: Download modules
        run: go mod download

      - name: Test (race detector)
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o filesync.exe .
