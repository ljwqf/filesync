name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Download modules (fresh mod cache)
        env:
          GOMODCACHE: ${{ runner.temp }}/gomod
        run: go mod download

      - name: Test (race detector)
        env:
          GOMODCACHE: ${{ runner.temp }}/gomod
        run: go test -race -count=1 ./...

      - name: Build
        env:
          GOMODCACHE: ${{ runner.temp }}/gomod
        run: go build -o filesync.exe .
